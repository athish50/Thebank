<html>

<head>
    <title>TheBank Login</title>
</head>

<body
style="
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

background-image:url('THEBANK.jpg');
background-size:cover;
background-position:center;
font-family:Arial;
"
>

    <div
    style="
    background:white;
    padding:40px;
    width:320px;
    border-radius:15px;
    text-align:center;
    "
    >

        <h1>Login</h1>

        <form action="/login" method="POST">

            <label for="uname">Username</label>
            <br><br>

            <input
            type="text"
            id="uname"
            name="uname"
            placeholder="Enter username"

            style="
            width:100%;
            padding:10px;
            "
            >

            <br><br>

            <label for="passkey">Password</label>
            <br><br>

            <input
            type="password"
            id="passkey"
            name="password"
            placeholder="Enter password"

            style="
            width:100%;
            padding:10px;
            "
            >

            <br><br>

            <input
            type="submit"
            value="Login"

            style="
            width:100%;
            padding:10px;
            cursor:pointer;
            "
            >

        </form>

        <br>

        <a href="/signup.html">
            Don't have an account? Signup
        </a>

    </div>

</body>

</html>
